# Manual release build: Intel macOS (x86_64) DMG only.
# Uses macos-15-intel so bundled Python/native wheels match x64 (see actions/runner-images README).
name: Release macOS x64 (DMG)

on:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: release-macos-x64-${{ github.ref }}
  cancel-in-progress: true

jobs:
  dmg:
    runs-on: macos-15-intel
    timeout-minutes: 120
    defaults:
      run:
        working-directory: electron

    env:
      # Unsigned CI build; avoids hanging on code-sign discovery.
      CSC_IDENTITY_AUTO_DISCOVERY: "false"
      # x64 bundle includes onnxruntime + llama-cpp + embedded Python dylib (~350–450 MB).
      BUNDLE_SIZE_BUDGET_MB: "500"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: pnpm
          cache-dependency-path: electron/pnpm-lock.yaml

      - name: Install JS dependencies
        run: pnpm install --frozen-lockfile

      - name: Assert x86_64 runner
        run: test "$(uname -m)" = "x86_64"

      - name: Build renderer and Python bundle
        run: |
          set -euo pipefail
          pnpm run build:renderer
          pnpm run prepare-bundle

      - name: Assert bundled Python prefix is self-contained
        run: |
          set -euo pipefail
          PY="../bundle/python/bin/python3"
          test -x "$PY"
          echo "pyvenv.cfg:"
          cat ../bundle/python/pyvenv.cfg
          "$PY" -c "import sys; print('prefix', sys.prefix); print('base_prefix', sys.base_prefix); print('path', sys.path[:4])"
          "$PY" -c "
          import sys
          assert '/Library/Frameworks' not in sys.prefix, sys.prefix
          assert '/Library/Frameworks' not in sys.base_prefix, sys.base_prefix
          import encodings
          print('encodings ok', encodings.__file__)
          "

      - name: Build x64 DMG
        run: pnpm exec electron-builder --mac dmg --x64 --publish never -c.mac.hardenedRuntime=false

      - name: Upload DMG
        uses: actions/upload-artifact@v4
        with:
          name: ReadingTime-macos-x64
          path: electron/dist/*.dmg
          if-no-files-found: error
